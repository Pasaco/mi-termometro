<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Termómetro Pro - Dynamic Gradients</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .hero-section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .card { background: #1e1e1e; margin: 10px; padding: 20px; border-radius: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); width: 85%; border: 1px solid #333; }
        .flex { display: flex; justify-content: space-around; width: 100%; }
        .value { font-size: 2.2em; font-weight: bold; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .temp-color { color: #ff5e62; } /* Rojo suave */
        .hum-color { color: #1abc9c; }  /* Verde agua */
        .label { color: #777; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; }
        .scroll-hint { position: absolute; bottom: 30px; color: #444; font-size: 0.8em; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
        .chart-section { padding: 20px 10px 50px 10px; background: #0f0f0f; min-height: 450px; }
        canvas { width: 100% !important; height: auto !important; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="hero-section" id="hero">
            <div id="app-data" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="card flex">
                    <div>
                        <div class="label">Temperatura</div>
                        <div id="temp" class="value temp-color">-- °C</div>
                    </div>
                    <div>
                        <div class="label">Humedad</div>
                        <div id="hum" class="value hum-color">-- %</div>
                    </div>
                </div>
                <div class="scroll-hint">🔼 HISTORIAL 24H 🔼</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="card">
                <div class="label" style="margin-bottom:15px; text-align:center;">Monitorización de Intensidad</div>
                <canvas id="graficaDual"></canvas>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAz2wvO_ryzMLmBp2p7UULY6Q8mQVh_o2Y", 
            databaseURL: "https://temperatura-casa-fe2e1-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ctx = document.getElementById('graficaDual').getContext('2d');

        // FUNCIÓN PARA CREAR GRADIENTES
        function createGradients(ctx) {
            // Gradiente Temperatura (Rojo)
            const gTemp = ctx.createLinearGradient(0, 0, 0, 300);
            gTemp.addColorStop(0, '#ff4d4d');   // Arriba: Rojo Intenso
            gTemp.addColorStop(1, '#ff9a9e');   // Abajo: Rosa Suave

            const bTemp = ctx.createLinearGradient(0, 0, 0, 300);
            bTemp.addColorStop(0, 'rgba(255, 77, 77, 0.4)'); // Relleno intenso arriba
            bTemp.addColorStop(1, 'rgba(255, 154, 158, 0.0)'); // Desaparece abajo

            // Gradiente Humedad (Verde Agua)
            const gHum = ctx.createLinearGradient(0, 0, 0, 300);
            gHum.addColorStop(0, '#1abc9c');    // Arriba: Verde Agua fuerte
            gHum.addColorStop(1, '#a8ffed');    // Abajo: Verde muy claro

            const bHum = ctx.createLinearGradient(0, 0, 0, 300);
            bHum.addColorStop(0, 'rgba(26, 188, 156, 0.4)');
            bHum.addColorStop(1, 'rgba(168, 255, 237, 0.0)');

            return { gTemp, bTemp, gHum, bHum };
        }

        const grads = createGradients(ctx);

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Temp',
                        yAxisID: 'yTemp',
                        borderColor: grads.gTemp,
                        backgroundColor: grads.bTemp,
                        data: [],
                        borderWidth: 4,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: 'Hum',
                        yAxisID: 'yHum',
                        borderColor: grads.gHum,
                        backgroundColor: grads.bHum,
                        data: [],
                        borderWidth: 4,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    x: { display: false },
                    yTemp: { position: 'left', grid: { color: '#222' }, ticks: { color: '#ff4d4d' } },
                    yHum: { position: 'right', grid: { display: false }, ticks: { color: '#1abc9c' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // Lógica de datos (Igual que la anterior)
        db.ref('sensor').on('value', snapshot => {
            const data = snapshot.val();
            if (data && data.temperatura !== -999) {
                document.getElementById('temp').innerText = data.temperatura + " °C";
                document.getElementById('hum').innerText = data.humedad + " %";
            }
        });

        db.ref('historial').limitToLast(100).on('value', snapshot => {
            const historyData = snapshot.val();
            const labels = [], tData = [], hData = [];
            for (let id in historyData) {
                tData.push(historyData[id].t);
                hData.push(historyData[id].h);
                labels.push(""); // No necesitamos etiquetas de texto en el eje X
            }
            chart.data.labels = labels;
            chart.data.datasets[0].data = tData;
            chart.data.datasets[1].data = hData;
            chart.update();
        });
    </script>
</body>
</html>
