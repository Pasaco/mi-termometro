<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Termómetro Pro v6.0</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --red: #ff6b6b;
            --teal: #1abc9c;
            --text-main: #ffffff;
            --text-dim: #666;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text-main); margin: 0; padding: 0; 
        }

        .hero-section { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative;
        }

        .realtime-container {
            display: flex; gap: 15px; width: 90%; max-width: 420px;
        }

        .card { 
            background: var(--card-bg); border-radius: 28px; 
            border: 1px solid #333; padding: 20px; text-align: center; flex: 1;
        }

        .card-temp { border-bottom: 4px solid var(--red); }
        .card-hum { border-bottom: 4px solid var(--teal); }
        .value { font-size: 2.3em; font-weight: 800; margin-top: 5px; }
        .label { color: var(--text-dim); font-size: 0.7em; text-transform: uppercase; letter-spacing: 2px; }

        /* CUADRO DE ERROR CORREGIDO */
        #error-card { 
            display: none; background: rgba(255, 107, 107, 0.05); 
            border: 2px solid var(--red); border-radius: 28px;
            padding: 25px; width: 85%; max-width: 380px; 
            text-align: center; box-sizing: border-box; 
        }

        /* SECCIÓN GRÁFICA CON ALTURA CONTROLADA */
        .chart-section { 
            padding: 20px 15px 50px 15px; background: #0a0a0a; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .chart-card { 
            width: 100%; max-width: 450px; background: var(--card-bg);
            border-radius: 28px; padding: 15px; box-sizing: border-box;
            border: 1px solid #333;
        }

        /* Contenedor con altura fija para evitar el estiramiento */
        .chart-container {
            position: relative;
            height: 300px; /* AQUÍ SE CONTROLA EL ALTO */
            width: 100%;
        }

        .scroll-hint { 
            position: absolute; bottom: 30px; color: #444; font-size: 0.7em; 
            animation: bounce 2s infinite; font-weight: bold;
        }
        @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }
    </style>
</head>
<body>

    <div class="hero-section">
        <div id="app-data" class="realtime-container">
            <div class="card card-temp">
                <div class="label">Temperatura</div>
                <div id="temp" class="value" style="color: var(--red)">--°C</div>
            </div>
            <div class="card card-hum">
                <div class="label">Humedad</div>
                <div id="hum" class="value" style="color: var(--teal)">--%</div>
            </div>
        </div>

        <div id="error-card">
            <div style="color: var(--red); font-weight: bold; margin-bottom: 5px;">⚠️ ESTADO DEL SISTEMA</div>
            <small id="error-text" style="color: #fff; opacity: 0.8;"></small>
        </div>

        <div class="scroll-hint">🔼 DESLIZA PARA HISTORIAL 🔼</div>
    </div>

    <div class="chart-section">
        <div class="chart-card">
            <div class="label" style="text-align:center; margin-bottom:15px;">Evolución 24 Horas</div>
            <div class="chart-container">
                <canvas id="graficaDual"></canvas>
            </div>
        </div>
    </div>


    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- 1. CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAz2wvO_ryzMLmBp2p7UULY6Q8mQVh_o2Y",
            databaseURL: "https://temperatura-casa-fe2e1-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. CONFIGURACIÓN DE LA GRÁFICA (Chart.js) ---
        const ctx = document.getElementById('graficaDual').getContext('2d');
        
        const gT = ctx.createLinearGradient(0, 0, 0, 300);
        gT.addColorStop(0, 'rgba(255, 107, 107, 0.4)'); gT.addColorStop(1, 'rgba(255, 107, 107, 0)');
        const gH = ctx.createLinearGradient(0, 0, 0, 300);
        gH.addColorStop(0, 'rgba(26, 188, 156, 0.4)'); gH.addColorStop(1, 'rgba(26, 188, 156, 0)');

        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'T', yAxisID: 'yT', borderColor: '#ff6b6b', backgroundColor: gT, data: [], borderWidth: 3, pointRadius: 0, fill: true, tension: 0.4 },
                { label: 'H', yAxisID: 'yH', borderColor: '#1abc9c', backgroundColor: gH, data: [], borderWidth: 3, pointRadius: 0, fill: true, tension: 0.4 }
            ]},
            options: {
                responsive: true,
                maintainAspectRatio: false, // Ahora sí obedece al contenedor de 300px
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: { 
                        grid: { 
                            color: (c) => c.tick && c.tick.label ? 'rgba(255,255,255,0.1)' : 'transparent', 
                            drawBorder: false 
                        },
                        ticks: { color: '#555', font: { size: 9 }, maxRotation: 0, autoSkip: false }
                    },
                    yT: { position: 'left', grid: { color: '#222' }, ticks: { color: '#ff6b6b' } },
                    yH: { position: 'right', grid: { display: false }, ticks: { color: '#1abc9c' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- 3. MONITOR EN TIEMPO REAL (DATOS, ERROR Y HEARTBEAT) ---
        db.ref('sensor').on('value', snapshot => {
            const data = snapshot.val();
            if (!data) return;

            const appData = document.getElementById('app-data');
            const errorCard = document.getElementById('error-card');
            const errorText = document.getElementById('error-text');

            const ahora = Math.floor(Date.now() / 1000);
            const segundosTranscurridos = ahora - data.latido;

            // Detección de Placa Apagada (más de 75 seg sin latido)
            if (segundosTranscurridos > 75) {
                appData.style.display = 'none';
                errorCard.style.display = 'block';
                errorText.innerText = "SISTEMA OFF: Placa desconectada";
            } 
            // Detección de Error de Sensor (-999)
            else if (data.temperatura <= -900) {
                appData.style.display = 'none';
                errorCard.style.display = 'block';
                errorText.innerText = "ERROR TÉCNICO: Sensor fallando";
            } 
            // Todo correcto
            else {
                appData.style.display = 'flex';
                errorCard.style.display = 'none';
                document.getElementById('temp').innerText = data.temperatura.toFixed(1) + "°C";
                document.getElementById('hum').innerText = data.humedad.toFixed(0) + "%";
            }
        });

        // --- 4. HISTORIAL CON EJE X PROPORCIONAL ---
        db.ref('historial').limitToLast(288).on('value', snapshot => {
            const historyData = snapshot.val();
            if (!historyData) return;

            const labels = [], tData = [], hData = [];
            let lastHourLabel = -1;

            // Iteramos sobre todos los puntos para mantener la línea de tiempo
            Object.values(historyData).forEach(punto => {
                tData.push(punto.t);
                hData.push(punto.h);
                
                const d = new Date(punto.ts);
                const hora = d.getHours();

                // Solo ponemos el texto de la hora (01:00, etc.) cuando cambia la hora
                // Esto crea una cuadrícula limpia y proporcional
                if (hora !== lastHourLabel) {
                    labels.push(hora.toString().padStart(2, '0') + ":00");
                    lastHourLabel = hora;
                } else {
                    labels.push(""); 
                }
            });

            chart.data.labels = labels;
            chart.data.datasets[0].data = tData;
            chart.data.datasets[1].data = hData;
            chart.update('none');
        });
    </script>
</body>
</html>
