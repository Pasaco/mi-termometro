<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mi Termómetro Inteligente</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #1c1c1c; color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #2d2d2d; margin: 20px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .value { font-size: 3em; font-weight: bold; color: #0088cc; }
        .label { color: #888; text-transform: uppercase; letter-spacing: 1px; }
        #denied { display: none; color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div id="app">
        <div class="card">
            <div class="label">Temperatura</div>
            <div id="temp" class="value">-- °C</div>
        </div>
        <div class="card">
            <div class="label">Humedad</div>
            <div id="hum" class="value">-- %</div>
        </div>
    </div>

    <div id="denied">⚠️ ACCESO DENEGADO: Usuario no autorizado.</div>

    <script>
        // Inicializar Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Abrir a pantalla completa

        // SEGURIDAD: Solo tu ID puede ver esto
        const MI_ID = 5395336798;
        if (tg.initDataUnsafe.user && tg.initDataUnsafe.user.id !== MI_ID) {
            document.getElementById('app').style.display = 'none';
            document.getElementById('denied').style.display = 'block';
        }

        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAz2wvO_ryzMLmBp2p7UULY6Q8mQVh_o2Y",
            databaseURL: "https://temperatura-casa-fe2e1-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Leer datos en tiempo real
        db.ref('sensor').on('value', (snapshot) => {
            const data = snapshot.val();
            document.getElementById('temp').innerText = data.temperatura + " °C";
            document.getElementById('hum').innerText = data.humedad + " %";
        });
    </script>
</body>
</html>
