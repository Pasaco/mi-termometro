<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Termómetro Pro - Cronología 24h</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --temp-red: #ff6b6b; /* Rojo pastel suave */
            --hum-teal: #1abc9c; /* Verde agua */
            --text-main: #ffffff;
            --text-dim: #666;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* SECCIÓN 1: DATOS ACTUALES (CENTRADOS) */
        .hero-section { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; /* Centrado vertical */
            align-items: center; 
            position: relative;
        }

        .realtime-container {
            display: flex;
            gap: 15px;
            width: 90%;
            max-width: 420px;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 28px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #333;
            padding: 20px;
            text-align: center;
        }

        .realtime-card {
            flex: 1;
            height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Bordes decorativos inferiores */
        .card-temp { border-bottom: 4px solid var(--temp-red); }
        .card-hum { border-bottom: 4px solid var(--hum-teal); }

        .value { font-size: 2.2em; font-weight: 800; margin-top: 5px; }
        .temp-val { color: var(--temp-red); text-shadow: 0 0 15px rgba(255,107,107,0.2); }
        .hum-val { color: var(--hum-teal); text-shadow: 0 0 15px rgba(26,188,156,0.2); }
        .label { color: var(--text-dim); font-size: 0.7em; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }

        /* SECCIÓN 2: GRÁFICA (SCROLL) */
        .chart-section { 
            padding: 40px 15px; 
            background: #0a0a0a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .chart-card { width: 95%; max-width: 450px; padding: 15px; box-sizing: border-box; }

        /* INDICADOR SCROLL */
        .scroll-hint { 
            position: absolute; 
            bottom: 35px; 
            color: #444; 
            font-size: 0.7em; 
            font-weight: bold;
            animation: bounce 2s infinite; 
            letter-spacing: 1.5px;
        }

        @keyframes bounce { 
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 
            40% {transform: translateY(-10px);} 
            60% {transform: translateY(-5px);} 
        }

        /* TARJETA DE ERROR */
        #err { 
            display: none; 
            border: 2px solid var(--red); 
            padding: 25px; 
            border-radius: 28px; 
            width: 85%; /* Deja un 7.5% de aire a cada lado */
            max-width: 380px; /* Evita que en pantallas grandes se estire demasiado */
            text-align: center; 
            box-sizing: border-box; /* ¡ESTO ES LA CLAVE! Evita que el padding ensanche la caja */
            background: rgba(255, 107, 107, 0.05); /* Un toque sutil de fondo rojo */
        }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="hero-section" id="hero">
            <div id="app-data" class="realtime-container">
                <div class="card realtime-card card-temp">
                    <div class="label">Temperatura</div>
                    <div id="temp" class="value temp-val">--°C</div>
                </div>
                <div class="card realtime-card card-hum">
                    <div class="label">Humedad</div>
                    <div id="hum" class="value hum-val">--%</div>
                </div>
            </div>

            <div id="error-card" class="card">
                <div style="color: var(--temp-red); font-size: 1.4em; font-weight: bold; margin-bottom: 10px;">⚠️ SENSOR ERROR</div>
                <div style="color: #fff; font-size: 0.8em; opacity: 0.8;">Comprueba la conexión del DHT22</div>
            </div>

            <div class="scroll-hint">🔼 HISTORIAL CRONOLÓGICO 🔼</div>
        </div>

        <div class="chart-section">
            <div class="card chart-card">
                <div class="label" style="margin-bottom:20px; text-align:center;">Evolución 24 Horas</div>
                <canvas id="graficaDual"></canvas>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- 1. CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAz2wvO_ryzMLmBp2p7UULY6Q8mQVh_o2Y", // Reemplaza por tu API Key
            databaseURL: "https://temperatura-casa-fe2e1-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. PREPARACIÓN DE LA GRÁFICA ---
        const ctx = document.getElementById('graficaDual').getContext('2d');
        
        // Gradientes para efecto de intensidad
        const gTemp = ctx.createLinearGradient(0, 0, 0, 300);
        gTemp.addColorStop(0, 'rgba(255, 107, 107, 0.4)'); gTemp.addColorStop(1, 'rgba(255, 107, 107, 0)');
        const gHum = ctx.createLinearGradient(0, 0, 0, 300);
        gHum.addColorStop(0, 'rgba(26, 188, 156, 0.4)'); gHum.addColorStop(1, 'rgba(26, 188, 156, 0)');

        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Temp', yAxisID: 'yTemp', borderColor: '#ff6b6b', backgroundColor: gTemp, data: [], borderWidth: 3, pointRadius: 0, fill: true, tension: 0.4 },
                { label: 'Hum', yAxisID: 'yHum', borderColor: '#1abc9c', backgroundColor: gHum, data: [], borderWidth: 3, pointRadius: 0, fill: true, tension: 0.4 }
            ]},
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: { 
                        display: true,
                        grid: {
                            // Solo dibuja línea vertical si hay una etiqueta (la hora)
                            color: (context) => context.tick.label ? 'rgba(255,255,255,0.1)' : 'transparent',
                            drawBorder: false
                        },
                        ticks: { color: '#555', font: { size: 9 }, maxRotation: 0, autoSkip: false }
                    },
                    yTemp: { position: 'left', grid: { color: '#222' }, ticks: { color: '#ff6b6b', font: { size: 10 } } },
                    yHum: { position: 'right', grid: { display: false }, ticks: { color: '#1abc9c', font: { size: 10 } } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- 3. DETECTOR DE DATOS Y ERROR (TIEMPO REAL) ---
        db.ref('sensor').on('value', snapshot => {
            const data = snapshot.val();
            const appData = document.getElementById('app-data');
            const errorCard = document.getElementById('error-card');

            // Si recibimos -999 o menor, activamos el modo error inmediatamente
            if (!data || data.temperatura <= -900) {
                appData.style.display = 'none';
                errorCard.style.display = 'block';
            } else {
                appData.style.display = 'flex';
                errorCard.style.display = 'none';
                document.getElementById('temp').innerText = data.temperatura.toFixed(1) + "°C";
                document.getElementById('hum').innerText = data.humedad.toFixed(1) + "%";
            }
        });

        // --- 4. HISTORIAL CRONOLÓGICO (24 HORAS) ---
        db.ref('historial').limitToLast(288).on('value', snapshot => {
            const historyData = snapshot.val();
            const labels = [], tData = [], hData = [];
            let lastHourLabel = -1;

            for (let id in historyData) {
                const punto = historyData[id];
                tData.push(punto.t);
                hData.push(punto.h);
                
                const date = new Date(punto.ts);
                const currentHour = date.getHours();

                // EJE X CRONOLÓGICO: 
                // Si esta hora es diferente a la anterior, ponemos la etiqueta "HH:00"
                if (currentHour !== lastHourLabel) {
                    labels.push(currentHour.toString().padStart(2, '0') + ":00");
                    lastHourLabel = currentHour;
                } else {
                    labels.push(""); // Puntos intermedios sin texto para no saturar
                }
            }

            chart.data.labels = labels;
            chart.data.datasets[0].data = tData;
            chart.data.datasets[1].data = hData;
            chart.update('none'); // Actualización suave
        });
    </script>
</body>
</html>
