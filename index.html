<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Termómetro Pro v6.1</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        :root {
            --bg: #121212; --card-bg: #1e1e1e;
            --red: #ff6b6b; --teal: #1abc9c;
            --text-main: #ffffff; --text-dim: #666;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text-main); margin: 0; padding: 0; 
            overscroll-behavior-y: none; 
        }

        .hero-section { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative;
        }

        .realtime-container {
            display: flex; gap: 15px; width: 90%; max-width: 420px;
        }

        .card { 
            background: var(--card-bg); border-radius: 28px; 
            border: 1px solid #333; padding: 20px; text-align: center; flex: 1;
        }

        .card-temp { border-bottom: 4px solid var(--red); }
        .card-hum { border-bottom: 4px solid var(--teal); }
        .value { font-size: 2.3em; font-weight: 800; margin-top: 5px; }
        .label { color: var(--text-main); font-size: 1em; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        #error-card { 
            display: none; background: rgba(255, 107, 107, 0.05); 
            border: 2px solid var(--red); border-radius: 28px;
            padding: 25px; width: 85%; max-width: 380px; 
            text-align: center; box-sizing: border-box; 
        }

        .chart-section { 
            padding: 20px 15px 50px 15px; background: #0a0a0a; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .chart-card { 
            width: 100%; max-width: 95%; background: var(--card-bg);
            border-radius: 28px; padding: 15px; box-sizing: border-box;
            border: 1px solid #333;
        }

        .scroll-wrapper { width: 100%; }

        .chart-container {
            position: relative;
            height: 300px; 
            width: 100%; 
        }

        .scroll-hint { 
            position: absolute; 
            bottom: 30px; 
            left: 0;                
            width: 100%;            
            text-align: center;     
            color: #444; 
            font-size: 0.7em; 
            animation: bounce 2s infinite; 
            font-weight: bold;
        }
        @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }
        
        .extra-card {
            width: 90%;
            max-width: 420px;
            margin-top: 15px; 
            flex: none;
            display: flex;
            justify-content: space-around; 
            padding: 15px 5px;
            border-bottom: 4px solid #ffffff; 
        }
        .minmax-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .minmax-box .value { font-size: 2em; }
        
        .time-label {
            font-size: 0.75em;
            color: #888;
            margin-top: 2px;
            font-family: monospace; 
        }
        /* Ajuste de tamaño de horas para que no sean tan invasivas en PC */
        .time-label .hour-val { font-size: 1.25em; color: #aaa; }
        .time-label .min-val { font-size: 1em; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div id="app-data" class="realtime-container">
            <div class="card card-temp">
                <div class="label">Temperatura</div>
                <div id="temp" class="value" style="color: var(--red)">--°C</div>
            </div>
            <div class="card card-hum">
                <div class="label">Humedad</div>
                <div id="hum" class="value" style="color: var(--teal)">--%</div>
            </div>
        </div>
        
        <div class="card extra-card" id="minmax-card">
            <div class="minmax-box">
                <div class="label">Máxima 24h</div>
                <div id="temp-max" class="value" style="color: var(--red)">--°C</div>
                <div id="time-max" class="time-label"><span class="hour-val">--</span>:<span class="min-val">--</span></div> 
            </div>
            <div class="minmax-box">
                <div class="label">Mínima 24h</div>
                <div id="temp-min" class="value" style="color: #0070b8">--°C</div> 
                <div id="time-min" class="time-label"><span class="hour-val">--</span>:<span class="min-val">--</span></div> 
            </div>
        </div>

        <div id="error-card">
            <div style="color: var(--red); font-weight: bold; margin-bottom: 5px;">⚠️ ADVERTENCIA ⚠️</div>
            <small id="error-text" style="color: #fff; opacity: 0.8;"></small>
        </div>

        <div class="scroll-hint">🔼 DESLIZA PARA HISTORIAL 🔼</div>
    </div>

    <div class="chart-section">
        <div class="chart-card">
            <div class="label" style="text-align:center; margin-bottom:15px;">Evolución 24 Horas (Desliza 👉)</div>
            <div class="scroll-wrapper">
                <div class="chart-container">
                    <canvas id="graficaDual"></canvas>
                </div>
            </div>
        </div>
    </div>

<script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAz2wvO_ryzMLmBp2p7UULY6Q8mQVh_o2Y",
            databaseURL: "https://temperatura-casa-fe2e1-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        const ctx = document.getElementById('graficaDual').getContext('2d');
        
        const chart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [
                { label: 'T', yAxisID: 'yT', borderColor: '#ff6b6b', data: [], borderWidth: 3, pointRadius: 0, fill: true, tension: 0.4, backgroundColor: 'rgba(255, 107, 107, 0.1)', spanGaps: false },
                { label: 'H', yAxisID: 'yH', borderColor: '#1abc9c', data: [], borderWidth: 3, pointRadius: 0, fill: true, tension: 0.4, backgroundColor: 'rgba(26, 188, 156, 0.1)', spanGaps: false }
            ]},
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        type: 'time', 
                        time: {
                            unit: 'hour', 
                            displayFormats: { hour: 'HH:mm' },
                            stepSize: 1
                        },
                        grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
                        ticks: { color: '#666', font: { size: 10 } }
                    },
                    yT: { 
                        position: 'left', 
                        grid: { color: '#222' }, 
                        ticks: { 
                            color: '#ff6b6b',
                            callback: function(value) { return value.toFixed(1); }
                        } 
                    },
                    yH: { 
                        position: 'right', 
                        grid: { display: false }, 
                        ticks: { 
                            color: '#1abc9c',
                            callback: function(value) { return value.toFixed(0); }
                        } 
                    }
                },
                plugins: { 
                    legend: { display: false }, 
                    tooltip: { 
                        mode: 'index', 
                        intersect: false,
                        callbacks: {
                            title: function(context) {
                                const d = new Date(context[0].parsed.x);
                                return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
                            },
                            label: function(context) {
                                if (context.parsed.y === null) return;
                                return context.dataset.label === 'T' 
                                    ? ' Temp: ' + context.parsed.y.toFixed(1) + '°C'
                                    : ' Hum: ' + context.parsed.y.toFixed(0) + '%';
                            }
                        }
                    },
                    zoom: {
                        pan: { enabled: true, mode: 'x' }
                    }
                }
            }
        });

        auth.signInAnonymously().catch((error) => { console.error("Error de seguridad:", error); });

        auth.onAuthStateChanged((user) => {
            if (user) {
                let datosActuales = null;

                db.ref('sensor').on('value', s => {
                    datosActuales = s.val();
                    comprobarEstado(); 
                });

                setInterval(comprobarEstado, 1000);

                function comprobarEstado() {
                    if (!datosActuales) return;
                    const appData = document.getElementById('app-data'), errorCard = document.getElementById('error-card'), errorText = document.getElementById('error-text');
                    const ahoraUTC = Math.floor(Date.now() / 1000);
                    const latidoCorregido = datosActuales.latido - 7200;

                    if (!datosActuales.latido || (ahoraUTC - latidoCorregido > 75)) {
                        appData.style.display = 'none'; errorCard.style.display = 'block'; errorText.innerText = "PLACA FUERA DE LÍNEA";
                    } else if (datosActuales.temperatura <= -900) {
                        appData.style.display = 'none'; errorCard.style.display = 'block'; errorText.innerText = "ERROR DE SENSOR";
                    } else {
                        appData.style.display = 'flex'; errorCard.style.display = 'none';
                        document.getElementById('temp').innerText = datosActuales.temperatura.toFixed(1) + "°C";
                        document.getElementById('hum').innerText = datosActuales.humedad.toFixed(0) + "%";
                    }
                }

                db.ref('historial').limitToLast(400).on('value', snapshot => {
                    const data = snapshot.val();
                    if (!data) return;

                    const temps = [], hums = [];
                    const ahora = Date.now();
                    const limite24h = ahora - (24 * 60 * 60 * 1000);
                    
                    // --- MAGIA 1: DETECCIÓN DE PANTALLA ---
                    // Si la pantalla es pequeña (móvil), mostramos 6 horas. Si es grande (PC), mostramos 24 horas.
                    const esMovil = window.innerWidth <= 768;
                    const horasVista = esMovil ? 6 : 24;
                    const vistaInicial = ahora - (horasVista * 60 * 60 * 1000); 
                    
                    chart.options.scales.x.min = vistaInicial;
                    chart.options.scales.x.max = ahora;

                    chart.options.plugins.zoom.limits = {
                        x: { min: limite24h, max: ahora }
                    };

                    let tiempoAnterior = 0;
                    
                    let maxT = -999; let maxTime = 0;
                    let minT = 999;  let minTime = 0;
                    
                    // Variables para anclar la gráfica de humedad también
                    let maxH = -999; 
                    let minH = 999;

                    Object.values(data).forEach(p => {
                        if (p.ts >= limite24h) {
                            
                            if (p.t > maxT) { maxT = p.t; maxTime = p.ts; }
                            if (p.t < minT) { minT = p.t; minTime = p.ts; }
                            
                            if (p.h > maxH) { maxH = p.h; }
                            if (p.h < minH) { minH = p.h; }

                            if (tiempoAnterior > 0 && (p.ts - tiempoAnterior > 600000)) {
                                temps.push({ x: p.ts - 1, y: null });
                                hums.push({ x: p.ts - 1, y: null });
                            }

                            temps.push({ x: p.ts, y: p.t });
                            hums.push({ x: p.ts, y: p.h });
                            
                            tiempoAnterior = p.ts;
                        }
                    });
                    
                    // --- MAGIA 2: BLOQUEO DE ALTURA (EJES Y) ---
                    // Fijamos los límites verticales basados en el registro absoluto de las 24 horas
                    // para que no haya efecto "terremoto" al hacer scroll
                    if (maxT !== -999) {
                        chart.options.scales.yT.min = Math.floor(minT) - 1; // 1 grado de margen por abajo
                        chart.options.scales.yT.max = Math.ceil(maxT) + 1;  // 1 grado de margen por arriba
                        
                        chart.options.scales.yH.min = Math.floor(minH) - 5; // 5% de margen por abajo
                        chart.options.scales.yH.max = Math.ceil(maxH) + 5;  // 5% de margen por arriba
                    }

                    const timeMaxElem = document.getElementById('time-max');
                    const timeMinElem = document.getElementById('time-min');

                    if (maxT !== -999) {
                        document.getElementById('temp-max').innerText = maxT.toFixed(1) + "°C";
                        const dMax = new Date(maxTime);
                        timeMaxElem.querySelector('.hour-val').innerText = dMax.getHours().toString().padStart(2, '0');
                        timeMaxElem.querySelector('.min-val').innerText = dMax.getMinutes().toString().padStart(2, '0');
                    }
                    if (minT !== 999) {
                        document.getElementById('temp-min').innerText = minT.toFixed(1) + "°C";
                        const dMin = new Date(minTime);
                        timeMinElem.querySelector('.hour-val').innerText = dMin.getHours().toString().padStart(2, '0');
                        timeMinElem.querySelector('.min-val').innerText = dMin.getMinutes().toString().padStart(2, '0');
                    }

                    chart.data.datasets[0].data = temps;
                    chart.data.datasets[1].data = hums;
                    chart.update('none');
                });
            }
        });
    </script>
</body>
</html>
