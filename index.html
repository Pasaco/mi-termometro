<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Termómetro Pro v3.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --temp-red: #ff5e62;
            --hum-teal: #1abc9c;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* SECCIÓN 1: CENTRADO DE DATOS ACTUALES */
        .hero-section { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }

        .realtime-container {
            display: flex;
            gap: 15px;
            width: 90%;
            max-width: 420px;
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 28px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #333;
            padding: 22px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .realtime-card {
            flex: 1;
            height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Colores dinámicos para las tarjetas */
        .card-temp { border-bottom: 4px solid var(--temp-red); }
        .card-hum { border-bottom: 4px solid var(--hum-teal); }

        .value { font-size: 2.2em; font-weight: 800; margin-top: 8px; }
        .temp-val { color: var(--temp-red); text-shadow: 0 0 15px rgba(255,94,98,0.2); }
        .hum-val { color: var(--hum-teal); text-shadow: 0 0 15px rgba(26,188,156,0.2); }
        .label { color: var(--text-dim); font-size: 0.75em; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        /* SECCIÓN 2: GRÁFICA */
        .chart-section { 
            padding: 40px 15px; 
            background: #0a0a0a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .chart-card { width: 95%; max-width: 450px; padding: 15px; }

        /* INDICADOR SCROLL */
        .scroll-hint { 
            position: absolute; 
            bottom: 35px; 
            color: #444; 
            font-size: 0.7em; 
            font-weight: bold;
            letter-spacing: 1.5px;
            animation: bounce 2s infinite; 
        }

        @keyframes bounce { 
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 
            40% {transform: translateY(-10px);} 
            60% {transform: translateY(-5px);} 
        }

        /* ESTADO DE ERROR */
        #error-card { 
            display: none; 
            background: rgba(255, 68, 68, 0.1); 
            border: 2px solid var(--temp-red); 
            width: 85%;
            color: var(--temp-red);
            font-weight: bold;
            padding: 30px;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="hero-section" id="hero">
            <div id="app-data" class="realtime-container">
                <div class="card realtime-card card-temp">
                    <div class="label">Temperatura</div>
                    <div id="temp" class="value temp-val">--°C</div>
                </div>
                <div class="card realtime-card card-hum">
                    <div class="label">Humedad</div>
                    <div id="hum" class="value hum-val">--%</div>
                </div>
            </div>

            <div id="error-card" class="card">
                <div style="font-size: 1.5em; margin-bottom: 10px;">⚠️ SENSOR ERROR</div>
                <div style="font-size: 0.8em; color: #fff;">Verifica la conexión del DHT22</div>
            </div>

            <div class="scroll-hint">🔼 HISTORIAL 24H 🔼</div>
        </div>

        <div class="chart-section">
            <div class="card chart-card">
                <div class="label" style="margin-bottom:20px; text-align:center;">Monitorización Combinada</div>
                <canvas id="graficaDual"></canvas>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Abre la App a pantalla completa en Telegram

        // --- 1. CONFIGURACIÓN FIREBASE ---
        // Sustituye "TU_CLAVE_AIzaSy..." por tu clave web real
        const firebaseConfig = {
            apiKey: "TU_CLAVE_AIzaSy...", 
            databaseURL: "https://temperatura-casa-fe2e1-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. PREPARACIÓN DE LA GRÁFICA ---
        const ctx = document.getElementById('graficaDual').getContext('2d');

        // Creación de Gradientes Dinámicos para el relleno
        const gTemp = ctx.createLinearGradient(0, 0, 0, 350);
        gTemp.addColorStop(0, 'rgba(255, 94, 98, 0.5)'); // Rojo arriba
        gTemp.addColorStop(1, 'rgba(255, 94, 98, 0)');   // Transparente abajo

        const gHum = ctx.createLinearGradient(0, 0, 0, 350);
        gHum.addColorStop(0, 'rgba(26, 188, 156, 0.5)'); // Verde agua arriba
        gHum.addColorStop(1, 'rgba(26, 188, 156, 0)');   // Transparente abajo

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Temperatura',
                        yAxisID: 'yTemp',
                        borderColor: '#ff5e62',
                        backgroundColor: gTemp,
                        data: [],
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4
                    },
                    {
                        label: 'Humedad',
                        yAxisID: 'yHum',
                        borderColor: '#1abc9c',
                        backgroundColor: gHum,
                        data: [],
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: { 
                        display: true,
                        grid: {
                            color: (context) => context.tick.label ? 'rgba(255,255,255,0.08)' : 'transparent',
                            drawBorder: false
                        },
                        ticks: { 
                            color: '#555', 
                            font: { size: 9 },
                            maxRotation: 0,
                            autoSkip: false 
                        }
                    },
                    yTemp: {
                        position: 'left',
                        grid: { color: '#222' },
                        ticks: { color: '#ff5e62', font: { size: 10, weight: 'bold' } },
                        title: { display: true, text: '°C', color: '#666', font: { size: 10 } }
                    },
                    yHum: {
                        position: 'right',
                        grid: { display: false },
                        ticks: { color: '#1abc9c', font: { size: 10, weight: 'bold' } },
                        title: { display: true, text: '%', color: '#666', font: { size: 10 } }
                    }
                },
                plugins: {
                    legend: { display: false } // Ocultamos leyenda para limpiar espacio
                }
            }
        });

        // --- 3. ESCUCHA DE DATOS EN TIEMPO REAL ---
        db.ref('sensor').on('value', snapshot => {
            const data = snapshot.val();
            const appData = document.getElementById('app-data');
            const errorCard = document.getElementById('error-card');

            // Lógica de detección de error (-999 enviado por Arduino)
            if (!data || data.temperatura === -999 || data.humedad === -999) {
                appData.style.display = 'none';
                errorCard.style.display = 'block';
            } else {
                appData.style.display = 'flex';
                errorCard.style.display = 'none';
                document.getElementById('temp').innerText = data.temperatura.toFixed(1) + "°C";
                document.getElementById('hum').innerText = data.humedad.toFixed(0) + "%";
            }
        });

        // --- 4. ESCUCHA DEL HISTORIAL (24H) ---
        db.ref('historial').limitToLast(288).on('value', snapshot => {
            const historyData = snapshot.val();
            const labels = [], tData = [], hData = [];

            for (let id in historyData) {
                tData.push(historyData[id].t);
                hData.push(historyData[id].h);
                
                const date = new Date(historyData[id].ts);
                const min = date.getMinutes();
                const hr = date.getHours();

                // Mostramos etiqueta solo en la marca de la hora (:00)
                if (min >= 0 && min < 5) {
                    labels.push(hr.toString().padStart(2, '0') + ":00");
                } else {
                    labels.push(""); 
                }
            }

            chart.data.labels = labels;
            chart.data.datasets[0].data = tData;
            chart.data.datasets[1].data = hData;
            chart.update('none'); // Update sin animaciones bruscas para suavidad
        });
    </script>
</body>
</html>
